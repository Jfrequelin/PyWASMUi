<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pyWasm Embedded Assets Example</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f4f6f8;
      }
      #app {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d9dee5;
        border-radius: 12px;
        padding: 16px;
      }
      .primary {
        background: #0a6f53;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .widget-pending {
        filter: grayscale(1);
        opacity: 0.6;
        pointer-events: none;
        transition: filter 120ms ease, opacity 120ms ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.__PYWASM_RUNTIME_CONFIG__ = {
        websocket: { path: "/ws" },
        mount: { elementId: "app" }
      };
    </script>
    <script type="module" src="/pywasm-assets/src/main.js"></script>
  </body>
</html>
