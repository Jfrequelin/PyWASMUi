<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyWASMui Examples</title>
    <link rel="stylesheet" href="/theme-modern.css?v=20260313b" />
  </head>
  <body>
    <main class="app-shell">
      <h1 class="app-title">PyWASMui Example Playground</h1>
      <p class="app-subtitle">A modern default surface for realtime Python-driven UI.</p>
      <div id="app"></div>
    </main>
    <script>
      const THEME_STORAGE_KEY = "pywasm.theme";
      const DEFAULT_THEME = "modern";

      function applyTheme(themeName) {
        const nextTheme = typeof themeName === "string" && themeName ? themeName : DEFAULT_THEME;
        document.documentElement.setAttribute("data-theme", nextTheme);
        try {
          localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        } catch {
          // Ignore storage failures.
        }
      }

      function currentTheme() {
        try {
          return localStorage.getItem(THEME_STORAGE_KEY) || DEFAULT_THEME;
        } catch {
          return DEFAULT_THEME;
        }
      }

      function syncThemeSelect() {
        const select = document.getElementById("theme_select");
        if (!(select instanceof HTMLSelectElement)) {
          return;
        }
        const theme = currentTheme();
        if (select.value !== theme) {
          select.value = theme;
        }
      }

      applyTheme(currentTheme());

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLSelectElement)) {
          return;
        }
        if (target.id === "theme_select") {
          applyTheme(target.value);
        }
      });

      const observer = new MutationObserver(() => {
        syncThemeSelect();
      });
      observer.observe(document.getElementById("app"), { childList: true, subtree: true });

      window.__PYWASM_RUNTIME_CONFIG__ = {
        websocket: { path: "/ws" },
        mount: { elementId: "app" }
      };
    </script>
    <script type="module" src="/pywasm-assets/src/main.js?v=20260313b"></script>
  </body>
</html>
